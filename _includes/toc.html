{% comment %}
动态文章目录 - 通过 JS 自动从 h2/h3 生成
{% endcomment %}
<nav class="toc" aria-label="文章目录">
  <div class="toc-header" onclick="this.parentElement.classList.toggle('toc-collapsed')">
    <span class="toc-title">📑 目录</span>
    <span class="toc-toggle">▼</span>
  </div>
  <ul class="toc-list" id="toc-list"></ul>
</nav>

<script>
(function() {
  var headings = document.querySelectorAll('.post-content h2, .post-content h3');
  if (headings.length < 2) return;

  var toc = document.getElementById('toc-list');
  var stack = [toc];
  var prevLevel = 2;

  headings.forEach(function(heading) {
    // 确保标题有 id
    if (!heading.id) {
      heading.id = heading.textContent.trim()
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\u4e00-\u9fa5-]/g, '');
    }

    var level = parseInt(heading.tagName.charAt(1));
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + heading.id;
    a.textContent = heading.textContent.trim();
    a.className = 'toc-link';
    li.appendChild(a);

    if (level > prevLevel) {
      var ul = document.createElement('ul');
      if (stack[stack.length - 1].lastElementChild) {
        stack[stack.length - 1].lastElementChild.appendChild(ul);
      } else {
        stack[stack.length - 1].appendChild(ul);
      }
      stack.push(ul);
    } else if (level < prevLevel) {
      while (stack.length > 1 && level < prevLevel) {
        stack.pop();
        prevLevel--;
      }
    }

    stack[stack.length - 1].appendChild(li);
    prevLevel = level;
  });

  toc.parentElement.style.display = 'block';
})();
</script>
