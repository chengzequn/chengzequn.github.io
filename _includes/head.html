<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/license.css" | relative_url }}">
  
  <!-- 资源预连接 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  
  <!-- SEO元标签 -->
  {% include seo.html %}
  
  <!-- 其他链接 -->
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">
  <link rel="alternate" hreflang="{{ site.lang | default: 'zh-CN' }}" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" hreflang="x-default" href="{{ page.url | replace:'index.html','' | absolute_url }}">

  <!-- 资源预连接（性能优化） -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://api.qrserver.com" crossorigin>
  


  <!-- 分析工具 -->
  {% if jekyll.environment == 'production' and site.google_analytics %}
    {% include google-analytics.html %}
  {% endif %}
  {% if jekyll.environment == 'production' and site.baidu_analytics %}
    {% include baidu-analytics.html %}
  {% endif %}
</head>
