---
layout: default
title: 工具集
permalink: /tools/
---

<article class="page h-entry">
  <header class="page-header">
    <h1 class="page-title p-name">工具集</h1>
  </header>

  <div class="page-content">
    <div class="tools-grid">
      {% for tool in site.data.tools %}
      <a class="tool-card" href="{{ tool.url }}" {% if tool.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
        <div class="tool-card-icon">{{ tool.icon }}</div>
        <div class="tool-card-content">
          <h3 class="tool-card-title">{{ tool.name }}</h3>
          <p class="tool-card-desc">{{ tool.description }}</p>
        </div>
        <div class="tool-card-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</article>
